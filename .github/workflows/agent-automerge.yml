name: Agent Automerge Trial

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  readiness:
    name: Check automerge eligibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read live PR labels
        id: live-pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          labels="$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' | paste -sd, -)"
          echo "labels=$labels" >> "$GITHUB_OUTPUT"

      - name: Classify automerge candidate
        id: candidate
        env:
          PR_LABELS: ${{ steps.live-pr.outputs.labels }}
          PR_IS_DRAFT: ${{ github.event.pull_request.draft }}
          REQUIRED_AUTOMERGE_LABEL: agent-automerge
        run: |
          if [[ "$PR_IS_DRAFT" == "true" ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=draft PR" >> "$GITHUB_OUTPUT"
          elif [[ ",$PR_LABELS," != *",$REQUIRED_AUTOMERGE_LABEL,"* ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing label: $REQUIRED_AUTOMERGE_LABEL" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "reason=label present and PR is ready for review" >> "$GITHUB_OUTPUT"
          fi

          echo "Automerge candidate: $(cat "$GITHUB_OUTPUT" | tr '\n' ' ')"

      - name: Check eligibility
        if: ${{ steps.candidate.outputs.eligible == 'true' }}
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          PR_LABELS: ${{ steps.live-pr.outputs.labels }}
        run: npm run check:automerge

      - name: Report automerge skip
        if: ${{ steps.candidate.outputs.eligible != 'true' }}
        run: |
          echo "Automerge is intentionally skipped: ${{ steps.candidate.outputs.reason }}"

      - name: Run full project checks
        run: npm run check:all

      - name: Enable native GitHub automerge
        if: ${{ steps.candidate.outputs.eligible == 'true' && vars.ENABLE_AGENT_AUTOMERGE == 'true' && github.event.pull_request.draft == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --squash --auto --delete-branch
