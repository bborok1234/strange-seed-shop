name: Agent Automerge Trial

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  readiness:
    name: Check automerge eligibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read live PR labels
        id: live-pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          labels="$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' | paste -sd, -)"
          echo "labels=$labels" >> "$GITHUB_OUTPUT"

      - name: Check eligibility
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          PR_LABELS: ${{ steps.live-pr.outputs.labels }}
        run: npm run check:automerge

      - name: Run full project checks
        run: npm run check:all

      - name: Enable native GitHub automerge
        if: ${{ vars.ENABLE_AGENT_AUTOMERGE == 'true' && github.event.pull_request.draft == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --squash --auto --delete-branch
