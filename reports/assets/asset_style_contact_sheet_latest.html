<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>이상한 씨앗상회 Asset Style Contact Sheet</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        color: #213f2e;
        font-family: system-ui, sans-serif;
        background: #f6f0cf;
      }
      h1,
      p {
        margin: 0 0 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 14px;
      }
      figure {
        margin: 0;
        padding: 12px;
        border: 1px solid rgba(68, 96, 55, 0.2);
        border-radius: 8px;
        background: rgba(255, 250, 220, 0.78);
      }
      img {
        display: block;
        width: 96px;
        height: 96px;
        margin: 0 auto 8px;
        object-fit: contain;
      }
      figcaption {
        font-size: 12px;
        font-weight: 800;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <h1>Asset Style Contact Sheet</h1>
    <p>Style anchor reference set for same-screen review, 48px/96px readability, family motif consistency, and screen integration decisions.</p>
    <section class="grid">
      <figure>
        <img src="../../public/assets/game/creatures/creature_herb_common_001.png" alt="" />
        <figcaption>creature_herb_common_001</figcaption>
      </figure>
      <figure>
        <img src="../../public/assets/game/creatures/creature_herb_common_002.png" alt="" />
        <figcaption>creature_herb_common_002</figcaption>
      </figure>
      <figure>
        <img src="../../public/assets/game/creatures/creature_lunar_common_001.png" alt="" />
        <figcaption>creature_lunar_common_001</figcaption>
      </figure>
      <figure>
        <img src="../../public/assets/game/seeds/seed_herb_001_icon.png" alt="" />
        <figcaption>seed_herb_001_icon</figcaption>
      </figure>
      <figure>
        <img src="../../public/assets/game/seeds/seed_lunar_001_icon.png" alt="" />
        <figcaption>seed_lunar_001_icon</figcaption>
      </figure>
      <figure>
        <img src="../../public/assets/game/ui/ui_order_crate_leaf_001.png" alt="" />
        <figcaption>ui_order_crate_leaf_001</figcaption>
      </figure>
      <figure>
        <img src="../../public/assets/game/fx/fx_production_tick_leaf_001_strip.png" alt="" />
        <figcaption>fx_production_tick_leaf_001</figcaption>
      </figure>
    </section>
  </body>
</html>
